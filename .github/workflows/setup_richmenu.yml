name: Setup Rich Menu

# LINEリッチメニューを登録する（機能拡張3）。手動実行のみ。
#
# ⚠️ 前提: メニューのボタンが実際に反応するには、先に Cloudflare Worker(webhook/)の
#   デプロイと LINE Webhook の接続が必要です。Worker 未デプロイの場合、メニューは
#   表示されますがタップしても無反応です（全アクションを Worker が処理するため）。
#
# 登録画像はリポジトリ同梱の webhook/richmenu.png を使う（フォント環境に依存しない）。
on:
  workflow_dispatch:

jobs:
  richmenu:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install requests

      - name: リッチメニューを登録（同梱画像を使用）
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python webhook/richmenu_setup.py webhook/richmenu.png
