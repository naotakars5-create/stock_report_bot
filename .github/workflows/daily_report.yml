name: Daily Stock Report

# 平日（日本時間の月〜金）の朝 8:15 JST（寄り付き 9:00 前）に自動実行する。
# GitHub Actions の cron は UTC で指定するため、JST 08:15 = UTC 23:15（前日）。
# 曜日も UTC 基準なので「UTC 日〜木(0-4)」が「JST 月〜金」に対応する（土日は配信しない）。
# 祝日・年末年始は main.py 側の休場日ガード(market_calendar.is_market_open)で
# 配信をスキップする（cron だけでは祝日を除外できないため）。
#
# 【重要・起動方法】GitHub の schedule は **実測で8〜14時間遅延** しており、
# これに頼ると「朝の速報」が夕方〜夜に届いてしまう（cron式の問題ではなく、
# private リポジトリのスケジューラがベストエフォートで大幅に遅延・間引かれるため）。
# そのため **外部cron(cron-job.org 等)から repository_dispatch で起動する** のが本線。
#   POST /repos/{owner}/{repo}/dispatches  {"event_type":"daily-report"}
#   → 8:15 JST に分単位で正確に起動できる（README「配信時刻を正確にする」参照）。
# 下の schedule は **保険**（外部cronが止まった場合の予備）として残す。遅れて起動しても
# main.py の二重配信ガード（daily_stats に当日行があればスキップ）が重複配信を防ぐ。
#
# データは前日終値ベース（寄り付き前は当日場が未了のため、前営業日の大引け値）。
# 祝日・年末年始は main.py の休場日ガードでスキップする。
on:
  repository_dispatch:
    types: [daily-report]
  schedule:
    - cron: "15 23 * * 0-4"   # 予備。23:15 UTC 日〜木 = 翌日 08:15 JST 月〜金（遅延あり）
  workflow_dispatch:
    inputs:
      force_run:
        description: "休場日でも強制実行する（手動検証用。土日祝でも配信する）"
        type: boolean
        default: false

jobs:
  report:
    runs-on: ubuntu-latest
    # 全銘柄（約3,700）を対象にすると一次スクリーニングのデータ取得に
    # 時間がかかるため、タイムアウトに余裕を持たせる。
    timeout-minutes: 90
    # 前回検証用に data/report_history.csv をリポジトリへコミットして永続化するため
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: レポート生成＆LINE送信
        # Secrets から認証情報を環境変数として渡す。
        # 未設定の場合でも main.py 側でスキップされ、処理は止まらない。
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          # データ異常・配信中止時の管理者通知先（未設定ならログのみ）。
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          # 手動実行で force_run=true のとき、休場日ガードを上書きして強制実行する。
          FORCE_RUN: ${{ inputs.force_run }}
          # 【機能1-a】朝ダイジェストのX投稿用（未設定なら投稿はスキップされる）。
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINE_ADD_FRIEND_URL: ${{ secrets.LINE_ADD_FRIEND_URL }}
        run: python main.py

      - name: 前回検証用の履歴・日次集計・成績台帳・マクロ状態を保存（コミット）
        # data/ 配下をリポジトリへ反映し、次回実行時の各機能に使えるようにする:
        #   report_history.csv  … 前回レポートの検証
        #   daily_stats.csv     … 通過率のパーセンタイル表示(P1-3)
        #   pick_ledger.csv / performance_monthly.csv … 累積成績(機能4)の継続蓄積
        #   macro_state.json    … マクロ鮮度(機能3)の前日比較の基準
        run: |
          if [ ! -d data ]; then
            echo "data ディレクトリが無いためスキップします。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "履歴・集計に変更はありません。"
          else
            git commit -m "Update report history, stats, performance ledger and macro state [skip ci]"
            git push
          fi
